<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <style>
         /* 1. The Entrance Question */
        #gatekeeper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: 0.5s;
        }

        .btn-group button {
            padding: 10px 25px;
            margin: 10px;
            cursor: pointer;
            border-radius: 20px;
            border: none;
            font-size: 1rem;
        }

        /* 2. The Main Stage */
        #main-content {
            text-align: center;
            opacity: 0;
            transition: 1s;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fce4ec;
            font-family: 'Arial', sans-serif;
        }

        .stage {
            text-align: center;
            position: relative;
        }

        /* This container is the magic box that hides the letter */
        .box-container {
            position: relative;
            width: 200px;
            height: 400px; /* Tall enough to let the letter fly up */
            margin: 0 auto;
            /* This hides anything that goes below the bottom of the box body */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden; 
        }

        /* The Lid */
        .lid {
            position: absolute;
            bottom: 145px; /* Sits right on top of the 150px body */
            left: -5px;
            width: 210px;
            height: 40px;
            background-color: #ad1457;
            z-index: 30; /* Highest layer */
            transition: 0.6s ease;
            cursor: pointer;
        }

        /* The Box Body */
        .box-body {
            position: relative;
            width: 200px;
            height: 150px;
            background-color: #d81b60;
            z-index: 20; /* In front of the letter */
            cursor: pointer;
        }

        .ribbon {
            position: absolute;
            left: 90px;
            width: 20px;
            height: 100%;
            background: #fdd835;
        }

        /* The Letter */
        .letter {
            position: absolute;
            bottom: 0; /* Starts hidden behind the box-body */
            left: 10px;
            width: 180px;
            height: 200px;
            background-color: white;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            z-index: 10; /* Behind the box-body */
            transition: 0.8s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
            box-sizing: border-box;
        }

        /* --- THE TRIGGER ANIMATIONS --- */
        
        /* 1. Lift and fade the lid */
        .stage.open .lid {
            transform: translateY(-150px) rotate(-15deg);
            opacity: 0;
        }

        /* 2. Slide the letter UP */
        .stage.open .letter {
            transform: translateY(-160px); /* Moves it out of the box */
        }
         /* Helper Classes */
        .hide { display: none !important; }
        .show { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <h1>Is it the big day?</h1>
        <div class="btn-group">
            <button style="background:#ec407a; color:white;" onclick="start()">Yes!</button>
            <button onclick="alert('Yes it is stop lying😒')">Not yet</button>
        </div>
    </div>

<body>

    <div class="stage" id="birthdayStage">
        <h1>Click the box for your letter</h1>
        
        <div class="box-container" onclick="document.getElementById('birthdayStage').classList.toggle('open')">
            
            <div class="lid"></div>

            <div class="letter">
                <p style="margin:0;"><strong>Dear Mom,</strong></p>
                <p style="font-size: 14px;">Happy Birthday! this is a special day for you i hope you enjoy the gifts and have many more to come! I love you!</p>
                <p style="font-size: 14px;">Love, [James Maina]</p>
            </div>

            <div class="box-body">
                <div class="ribbon"></div>
            </div>
              <script>
        function start() {
            document.getElementById('gatekeeper').classList.add('hide');
            document.getElementById('main-content').classList.add('show');
        }
    </script>

        </div>
    </div>

</body>
</html>
